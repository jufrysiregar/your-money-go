<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lupa Password - Your Money Go</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card">
        <div style="margin-bottom: 1rem;">
            <button id="backToHome" class="back-button-blue">
                <i class="fas fa-arrow-left"></i> kembali ke halaman utama
            </button>
        </div>
        
        <h2 class="card-title">Lupa Password</h2>
        
        <div id="errorMessage" class="error-message-custom" style="display: none;"></div>
        <div id="successMessage" class="success-message-custom" style="display: none;"></div>
        
        <form id="forgotForm">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="Masukkan email Anda">
                </div>
            </div>
            
            <button type="submit" class="btn-primary">Kirim Link Reset</button>
        </form>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    
    <script>
        // Tombol kembali ke halaman utama
        document.getElementById('backToHome')?.addEventListener('click', () => {
            window.location.href = '../index.html';
        });
        
        const forgotForm = document.getElementById('forgotForm');
        const emailInput = document.getElementById('resetEmail');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        let hideTimeout;
        
        function hideMessages() {
            if (hideTimeout) clearTimeout(hideTimeout);
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        }
        
        function showErrorMessage(message) {
            if (hideTimeout) clearTimeout(hideTimeout);
            successDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            hideTimeout = setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccessMessage(message) {
            if (hideTimeout) clearTimeout(hideTimeout);
            errorDiv.style.display = 'none';
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            hideTimeout = setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }
        
        emailInput.addEventListener('focus', hideMessages);
        
        forgotForm?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showErrorMessage('Masukkan email terlebih dahulu');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showErrorMessage('Format email tidak valid');
                return;
            }
            
            try {
                // Cek apakah email terdaftar di Firestore
                const usersRef = db.collection('users');
                const querySnapshot = await usersRef.where('email', '==', email).get();
                
                if (querySnapshot.empty) {
                    showErrorMessage('Email tidak terdaftar. Silakan daftar terlebih dahulu.');
                    return;
                }
                
                // Kirim email reset password melalui Firebase Auth
                // Firebase akan mengirim email dengan link ke halaman yang sudah diatur di Action URL
                await auth.sendPasswordResetEmail(email);
                
                showSuccessMessage('Link reset password telah dikirim ke email Anda. Silakan cek inbox atau folder spam.');
                
                // Reset form
                emailInput.value = '';
                
            } catch (error) {
                console.error('Error:', error);
                if (error.code === 'auth/user-not-found') {
                    showErrorMessage('Email tidak terdaftar');
                } else {
                    showErrorMessage('Terjadi kesalahan, silakan coba lagi');
                }
            }
        });
    </script>
</body>
</html>
