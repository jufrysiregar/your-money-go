<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reset Password - Your Money Go</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div class="card" style="max-width: 500px;">
        <h2 class="card-title">Reset Password</h2>
        
        <div id="errorMessage" class="error-message-custom" style="display: none;"></div>
        <div id="successMessage" class="success-message-custom" style="display: none;"></div>
        
        <form id="resetPasswordForm">
            <div class="form-group">
                <label>Email Anda</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Masukkan email Anda" readonly style="background: rgba(255,255,255,0.02);">
                </div>
            </div>
            
            <div class="form-group">
                <label>Pilih Hint Konfirmasi</label>
                <select id="hintQuestion" class="hint-select" required>
                    <option value="">Pilih pertanyaan keamanan</option>
                    <option value="nickname">Nama panggilan kamu</option>
                    <option value="mother">Nama ibu kandung</option>
                    <option value="school">Nama sekolah/universitas terakhir</option>
                </select>
                <input type="text" id="hintAnswer" class="hint-answer-input" placeholder="Masukkan Jawaban" style="margin-top: 10px;">
            </div>
            
            <div class="form-group">
                <label>Password Baru</label>
                <div class="password-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="Max 8 karakter, huruf kapital & simbol" maxlength="8">
                    <i class="fas fa-eye-slash toggle-password" id="toggleNewPassword"></i>
                </div>
                <small style="color: var(--text-secondary); font-size: 0.7rem;">Password harus 8 karakter, mengandung 1 huruf BESAR dan 1 simbol (!@#$%^&*)</small>
            </div>
            
            <button type="submit" class="btn-primary">Simpan Perubahan</button>
        </form>
        
        <div class="auth-links-row" style="margin-top: 1rem;">
            <button id="backToLogin" class="link-button-row-blue">Kembali ke Login</button>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    
    <script>
        // ==================== AMBIL PARAMETER DARI URL FIREBASE ====================
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');
        const apiKey = urlParams.get('apiKey');
        let resetEmail = urlParams.get('email');
        
        console.log('Mode:', mode);
        console.log('oobCode:', oobCode);
        console.log('Email dari URL:', resetEmail);
        
        // ==================== ELEMEN DOM ====================
        const toggleNewPassword = document.getElementById('toggleNewPassword');
        const newPasswordInput = document.getElementById('newPassword');
        const resetForm = document.getElementById('resetPasswordForm');
        const emailInput = document.getElementById('email');
        const hintQuestionSelect = document.getElementById('hintQuestion');
        const hintAnswerInput = document.getElementById('hintAnswer');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        let hideTimeout;
        let storedEmail = null; // Untuk menyimpan email hasil verifikasi
        
        // ==================== TOGGLE PASSWORD ====================
        if (toggleNewPassword) {
            toggleNewPassword.addEventListener('click', function() {
                const type = newPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                newPasswordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
        
        // ==================== BACK TO LOGIN ====================
        document.getElementById('backToLogin')?.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
        
        // ==================== FUNGSI UTILITY ====================
        function showError(message) {
            if (hideTimeout) clearTimeout(hideTimeout);
            successDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            hideTimeout = setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            if (hideTimeout) clearTimeout(hideTimeout);
            errorDiv.style.display = 'none';
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            hideTimeout = setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }
        
        // ==================== VALIDASI PASSWORD ====================
        function validatePassword(password) {
            if (password.length !== 8) {
                return { valid: false, message: 'Password harus tepat 8 karakter' };
            }
            if (!/[A-Z]/.test(password)) {
                return { valid: false, message: 'Password harus mengandung 1 huruf kapital' };
            }
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                return { valid: false, message: 'Password harus mengandung 1 simbol (!@#$%^&* dll)' };
            }
            return { valid: true, message: '' };
        }
        
        // ==================== VERIFIKASI HINT DARI FIRESTORE ====================
        async function verifyHint(email, question, answer) {
            try {
                const usersRef = db.collection('users');
                const querySnapshot = await usersRef.where('email', '==', email).get();
                
                if (querySnapshot.empty) {
                    return { exists: false, valid: false };
                }
                
                let userData = null;
                querySnapshot.forEach(doc => {
                    userData = doc.data();
                });
                
                if (userData && userData.hintQuestion === question && 
                    userData.hintAnswer === answer.toLowerCase()) {
                    return { exists: true, valid: true };
                }
                
                return { exists: true, valid: false };
            } catch (error) {
                console.error('Error verifying hint:', error);
                return { exists: false, valid: false };
            }
        }
        
        // ==================== AMBIL EMAIL DARI OOBCODE ====================
        async function getEmailFromOobCode(code) {
            try {
                // Firebase function to verify password reset code
                const email = await auth.verifyPasswordResetCode(code);
                return email;
            } catch (error) {
                console.error('Error verifying reset code:', error);
                return null;
            }
        }
        
        // ==================== INISIALISASI HALAMAN ====================
        async function initializePage() {
            // Jika ada oobCode, verifikasi dan dapatkan email
            if (mode === 'resetPassword' && oobCode) {
                try {
                    // Verifikasi kode reset password untuk mendapatkan email
                    const email = await auth.verifyPasswordResetCode(oobCode);
                    storedEmail = email;
                    if (emailInput) {
                        emailInput.value = email;
                    }
                    console.log('Email berhasil diverifikasi:', email);
                } catch (error) {
                    console.error('Kode reset tidak valid:', error);
                    if (error.code === 'auth/expired-action-code') {
                        showError('Link reset password sudah kadaluarsa. Silakan minta link baru.');
                    } else if (error.code === 'auth/invalid-action-code') {
                        showError('Link reset password tidak valid. Silakan minta link baru.');
                    } else {
                        showError('Link reset password tidak valid atau sudah digunakan.');
                    }
                }
            } 
            // Jika ada email dari URL, gunakan langsung
            else if (resetEmail) {
                storedEmail = resetEmail;
                if (emailInput) {
                    emailInput.value = resetEmail;
                }
            }
            // Jika tidak ada, biarkan user input manual
            else {
                if (emailInput) {
                    emailInput.readOnly = false;
                    emailInput.style.background = 'rgba(255,255,255,0.05)';
                    emailInput.placeholder = 'Masukkan email Anda';
                }
            }
        }
        
        // ==================== SUBMIT FORM RESET PASSWORD ====================
        resetForm?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Ambil email dari input (jika ada)
            let email = emailInput.value.trim();
            
            // Jika email kosong tapi ada storedEmail, gunakan storedEmail
            if (!email && storedEmail) {
                email = storedEmail;
            }
            
            const hintQuestion = hintQuestionSelect.value;
            const hintAnswer = hintAnswerInput.value.trim();
            const newPassword = newPasswordInput.value;
            
            // Validasi email
            if (!email) {
                showError('Email yang anda masukkan tidak tepat');
                return;
            }
            
            // Validasi hint
            if (!hintQuestion || !hintAnswer) {
                showError('Isi semua bagian yang kosong terlebih dahulu');
                return;
            }
            
            // Validasi password
            if (!newPassword) {
                showError('Password baru tidak boleh kosong');
                return;
            }
            
            const passwordValidation = validatePassword(newPassword);
            if (!passwordValidation.valid) {
                showError(passwordValidation.message);
                return;
            }
            
            // Verifikasi email dan hint dari Firestore
            const verification = await verifyHint(email, hintQuestion, hintAnswer);
            
            if (!verification.exists) {
                showError('Email yang anda masukkan tidak tepat');
                return;
            }
            
            if (!verification.valid) {
                showError('Hint tidak tepat, coba lagi');
                return;
            }
            
            // ==================== RESET PASSWORD ====================
            try {
                // Jika ada oobCode, gunakan confirmPasswordReset
                if (mode === 'resetPassword' && oobCode) {
                    // Reset password menggunakan kode dari Firebase
                    await auth.confirmPasswordReset(oobCode, newPassword);
                    showSuccess('Perubahan diterima, silahkan login..');
                    
                    // Redirect ke login setelah 3 detik
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } 
                // Jika tidak ada oobCode, kirim email reset baru
                else {
                    // Kirim email reset password baru
                    await auth.sendPasswordResetEmail(email);
                    showSuccess('Link reset password telah dikirim ke email Anda. Silakan cek inbox atau folder spam.');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 5000);
                }
                
                // Reset form
                resetForm.reset();
                
            } catch (error) {
                console.error('Reset password error:', error);
                
                if (error.code === 'auth/expired-action-code') {
                    showError('Link reset password sudah kadaluarsa. Silakan minta link baru.');
                } else if (error.code === 'auth/invalid-action-code') {
                    showError('Link reset password tidak valid. Silakan minta link baru.');
                } else if (error.code === 'auth/user-not-found') {
                    showError('Email yang anda masukkan tidak tepat');
                } else if (error.code === 'auth/weak-password') {
                    showError('Password terlalu lemah. Gunakan 8 karakter dengan huruf besar dan simbol.');
                } else {
                    showError('Terjadi kesalahan, silakan coba lagi');
                }
            }
        });
        
        // ==================== HILANGKAN PESAN SAAT USER KLIK INPUT ====================
        const inputs = [emailInput, hintQuestionSelect, hintAnswerInput, newPasswordInput];
        inputs.forEach(input => {
            if (input) {
                input.addEventListener('focus', () => {
                    if (hideTimeout) clearTimeout(hideTimeout);
                    errorDiv.style.display = 'none';
                    successDiv.style.display = 'none';
                });
            }
        });
        
        // ==================== JALANKAN INISIALISASI ====================
        initializePage();
    </script>
</body>
</html>
