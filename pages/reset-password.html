<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reset Password - Your Money Go</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card">
        <div style="margin-bottom: 1rem;">
            <button id="backButton" class="back-button-simple">
                <i class="fas fa-arrow-left"></i> kembali
            </button>
        </div>
        
        <h2 class="card-title">Buat Password Baru</h2>
        
        <div id="errorMessage" class="error-message-custom" style="display: none;"></div>
        <div id="successMessage" class="success-message-custom" style="display: none;"></div>
        
        <form id="resetPasswordForm">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" readonly style="background: rgba(255,255,255,0.02);">
                </div>
            </div>
            
            <div class="form-group">
                <label>Pilih Pertanyaan Keamanan</label>
                <select id="hintQuestion" class="hint-select">
                    <option value="">Pilih pertanyaan keamanan</option>
                    <option value="nickname">Nama panggilan kamu</option>
                    <option value="mother">Nama ibu kandung</option>
                    <option value="school">Nama sekolah/universitas terakhir</option>
                </select>
                <input type="text" id="hintAnswer" class="hint-answer-input" placeholder="Masukkan Jawaban">
            </div>
            
            <div class="form-group">
                <label>Password Baru</label>
                <div class="password-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="Max 8 karakter, huruf kapital & simbol" maxlength="8">
                    <i class="fas fa-eye-slash toggle-password" id="toggleNewPassword"></i>
                </div>
                <small style="color: var(--text-secondary); font-size: 0.7rem;">Password maksimal 8 karakter, mengandung 1 huruf BESAR dan 1 simbol (!@#$%^&*)</small>
            </div>
            
            <button type="submit" class="btn-primary">Simpan Perubahan</button>
        </form>
        
        <div class="auth-links-row">
            <button id="backToLogin" class="link-button-row-blue">Kembali ke Login</button>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    
    <script>
        document.getElementById('backButton')?.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
        
        document.getElementById('backToLogin')?.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
        
        // Toggle Password
        const toggleNewPassword = document.getElementById('toggleNewPassword');
        const newPasswordInput = document.getElementById('newPassword');
        
        if (toggleNewPassword) {
            toggleNewPassword.addEventListener('click', function() {
                const type = newPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                newPasswordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
        
        // Validasi password dengan LOCK
        function validatePassword(password) {
            // Maksimal 8 karakter
            if (password.length > 8) {
                return { valid: false, message: 'Password maksimal 8 karakter' };
            }
            // Minimal 8 karakter
            if (password.length < 8) {
                return { valid: false, message: 'Password harus 8 karakter' };
            }
            if (!/[A-Z]/.test(password)) {
                return { valid: false, message: 'Password harus mengandung 1 huruf kapital (A-Z)' };
            }
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                return { valid: false, message: 'Password harus mengandung 1 simbol (!@#$%^&* dll)' };
            }
            return { valid: true, message: '' };
        }
        
        // Real-time validasi password
        newPasswordInput?.addEventListener('input', function() {
            const password = this.value;
            const result = validatePassword(password);
            
            const existingError = document.getElementById('password-error');
            if (existingError) existingError.remove();
            
            if (!result.valid && password.length > 0) {
                const errorMsg = document.createElement('small');
                errorMsg.id = 'password-error';
                errorMsg.style.color = '#ff6b6b';
                errorMsg.style.fontSize = '0.7rem';
                errorMsg.style.display = 'block';
                errorMsg.style.marginTop = '5px';
                errorMsg.textContent = result.message;
                this.parentElement.parentElement.appendChild(errorMsg);
            }
        });
        
        // Fungsi verifikasi hint
        async function verifyHint(email, question, answer) {
            try {
                const usersRef = db.collection('users');
                const querySnapshot = await usersRef.where('email', '==', email).get();
                
                if (querySnapshot.empty) {
                    return false;
                }
                
                let userData = null;
                querySnapshot.forEach(doc => {
                    userData = doc.data();
                });
                
                if (userData && userData.hintQuestion === question && 
                    userData.hintAnswer === answer.toLowerCase()) {
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error verifying hint:', error);
                return false;
            }
        }
        
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        let hideTimeout;
        
        function showError(message) {
            if (hideTimeout) clearTimeout(hideTimeout);
            successDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            hideTimeout = setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            if (hideTimeout) clearTimeout(hideTimeout);
            errorDiv.style.display = 'none';
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            hideTimeout = setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }
        
        function shakeElement(element) {
            if (element) {
                element.classList.add('shake-animation');
                setTimeout(() => {
                    element.classList.remove('shake-animation');
                }, 300);
            }
        }
        
        const resetForm = document.getElementById('resetPasswordForm');
        const emailInput = document.getElementById('email');
        const hintQuestionSelect = document.getElementById('hintQuestion');
        const hintAnswerInput = document.getElementById('hintAnswer');
        
        resetForm?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userEmail = emailInput.value;
            const hintQuestion = hintQuestionSelect.value;
            const hintAnswer = hintAnswerInput.value.trim();
            const newPassword = newPasswordInput.value;
            
            if (!userEmail || !hintQuestion || !hintAnswer || !newPassword) {
                showError('Isi semua bagian yang kosong terlebih dahulu');
                shakeElement(document.querySelector('.card'));
                return;
            }
            
            const passwordValidation = validatePassword(newPassword);
            if (!passwordValidation.valid) {
                showError(passwordValidation.message);
                shakeElement(document.querySelector('.card'));
                return;
            }
            
            const isValidHint = await verifyHint(userEmail, hintQuestion, hintAnswer);
            
            if (!isValidHint) {
                showError('Hint salah');
                shakeElement(document.querySelector('.card'));
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(userEmail);
                showSuccess('Link reset password telah dikirim ke email Anda. Silakan cek email untuk mengatur password baru.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 5000);
            } catch (error) {
                console.error('Reset password error:', error);
                showError(error.message || 'Terjadi kesalahan, silakan coba lagi');
            }
        });
        
        const inputs = [emailInput, hintQuestionSelect, hintAnswerInput, newPasswordInput];
        inputs.forEach(input => {
            if (input) {
                input.addEventListener('focus', () => {
                    if (hideTimeout) clearTimeout(hideTimeout);
                    errorDiv.style.display = 'none';
                    successDiv.style.display = 'none';
                });
            }
        });
        
        const urlParams = new URLSearchParams(window.location.search);
        const emailFromUrl = urlParams.get('email');
        if (emailFromUrl && emailInput) {
            emailInput.value = emailFromUrl;
        }
    </script>
</body>
</html>
